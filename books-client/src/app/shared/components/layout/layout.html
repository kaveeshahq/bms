<div class="layout-wrapper">

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-left">
      <span class="navbar-logo">📚</span>
      <span class="navbar-title">Library Management System</span>
    </div>
    <div class="navbar-right">
      <div class="user-chip">
        <div class="user-avatar">{{ userInitial }}</div>
        <span class="user-email">{{ userEmail }}</span>
      </div>
      <button class="theme-toggle-btn" (click)="toggleTheme()" [matTooltip]="(currentTheme$ | async) === 'light' ? 'Switch to Dark Mode' : 'Switch to Light Mode'">
        <mat-icon *ngIf="(currentTheme$ | async) === 'light'">dark_mode</mat-icon>
        <mat-icon *ngIf="(currentTheme$ | async) === 'dark'">light_mode</mat-icon>
      </button>
      <button class="logout-btn" (click)="logout()" matTooltip="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>

  <div class="content-wrapper">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-label">Main Menu</div>
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/books" routerLinkActive="active-link">
        <mat-icon>menu_book</mat-icon>
        <span>Books</span>
      </a>
      <a class="nav-item" routerLink="/members" routerLinkActive="active-link">
        <mat-icon>people</mat-icon>
        <span>Members</span>
      </a>
      <a class="nav-item" routerLink="/borrowings" routerLinkActive="active-link">
        <mat-icon>swap_horiz</mat-icon>
        <span>Borrowings</span>
      </a>
      <a class="nav-item" routerLink="/fines" routerLinkActive="active-link">
        <mat-icon>payments</mat-icon>
        <span>Fines</span>
      </a>
    </div>

    <!-- Content -->
    <div class="main-content">
      <router-outlet />
    </div>
  </div>
</div>
