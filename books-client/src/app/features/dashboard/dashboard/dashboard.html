<div class="dashboard-content">

  <div class="welcome-section">
    <p class="welcome-title">Welcome back, {{ userEmail }} 👋</p>
    <p class="welcome-sub">Here's what's happening in your library today.</p>
  </div>

  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon-wrapper books-wrapper">
          <mat-icon class="stat-icon books-icon">menu_book</mat-icon>
        </div>
        <div class="stat-info">
          <p class="stat-label">Total Books</p>
          <p class="stat-number">{{ totalBooks }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon-wrapper members-wrapper">
          <mat-icon class="stat-icon members-icon">people</mat-icon>
        </div>
        <div class="stat-info">
          <p class="stat-label">Total Members</p>
          <p class="stat-number">{{ totalMembers }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon-wrapper borrow-wrapper">
          <mat-icon class="stat-icon borrowings-icon">swap_horiz</mat-icon>
        </div>
        <div class="stat-info">
          <p class="stat-label">Active Borrowings</p>
          <p class="stat-number">{{ activeBorrowings }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon-wrapper fines-wrapper">
          <mat-icon class="stat-icon fines-icon">payments</mat-icon>
        </div>
        <div class="stat-info">
          <p class="stat-label">Pending Fines</p>
          <p class="stat-number">{{ pendingFines }}</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

</div>
