<div class="page-wrapper">
  <div class="page-header">
    <button mat-icon-button routerLink="/borrowings">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>📖 Issue Book</h2>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <form (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Select Book</mat-label>
          <mat-select [(ngModel)]="formData.bookId" name="bookId" required>
            <mat-option *ngFor="let book of availableBooks" [value]="book.id">
              {{ book.title }} — {{ book.author }}
            </mat-option>
          </mat-select>
          <mat-hint>Only available books shown</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Select Member</mat-label>
          <mat-select [(ngModel)]="formData.memberId" name="memberId" required>
            <mat-option *ngFor="let member of members" [value]="member.id">
              {{ member.fullName }} — {{ member.email }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Due Days</mat-label>
          <input matInput type="number"
                 [(ngModel)]="formData.dueDays"
                 name="dueDays" required />
          <mat-hint>Default is 14 days</mat-hint>
        </mat-form-field>

        <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
        <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/borrowings">Cancel</button>
          <button mat-raised-button color="primary" type="submit">
            Issue Book
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
