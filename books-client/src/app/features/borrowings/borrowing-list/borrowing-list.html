<div class="page-wrapper">
  <div class="page-header">
    <h2>🔄 Borrowings</h2>
    <button mat-raised-button color="primary" routerLink="/borrowings/issue">
      <mat-icon>add</mat-icon> Issue Book
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="borrowings" class="full-width">

        <ng-container matColumnDef="book">
          <th mat-header-cell *matHeaderCellDef>Book</th>
          <td mat-cell *matCellDef="let b">{{ b.bookTitle }}</td>
        </ng-container>

        <ng-container matColumnDef="member">
          <th mat-header-cell *matHeaderCellDef>Member</th>
          <td mat-cell *matCellDef="let b">{{ b.memberName }}</td>
        </ng-container>

        <ng-container matColumnDef="issueDate">
          <th mat-header-cell *matHeaderCellDef>Issue Date</th>
          <td mat-cell *matCellDef="let b">
            {{ b.issueDate | date: 'yyyy-MM-dd' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="dueDate">
          <th mat-header-cell *matHeaderCellDef>Due Date</th>
          <td mat-cell *matCellDef="let b">
            {{ b.dueDate | date: 'yyyy-MM-dd' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let b">
            <span class="status-badge" [ngClass]="{
              'badge-active':   b.status === 'Active',
              'badge-returned': b.status === 'Returned',
              'badge-overdue':  b.status === 'Overdue'
            }">{{ b.status }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="fine">
          <th mat-header-cell *matHeaderCellDef>Fine</th>
          <td mat-cell *matCellDef="let b">
            <span *ngIf="b.fineAmount">
              ${{ b.fineAmount }}
              <span class="fine-badge"
                [ngClass]="b.finePaid ? 'fine-paid' : 'fine-unpaid'">
                {{ b.finePaid ? 'Paid' : 'Unpaid' }}
              </span>
            </span>
            <span *ngIf="!b.fineAmount" class="no-fine">—</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let b">
            <button mat-stroked-button color="primary"
                    *ngIf="b.status === 'Active'"
                    (click)="returnBook(b.id)"
                    style="margin-right: 8px;">
              Return
            </button>
            <button mat-stroked-button color="accent"
                    *ngIf="b.status === 'Active'"
                    (click)="renewBook(b.id)">
              Renew
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="7">No borrowings found.</td>
        </tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
