<div class="page-wrapper">
  <div class="page-header">
    <h2 class="page-title">💰 Fines</h2>
    <p class="page-subtitle">Track and manage overdue fines</p>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="fines" class="full-width">

      <ng-container matColumnDef="book">
        <th mat-header-cell *matHeaderCellDef>Book</th>
        <td mat-cell *matCellDef="let f">
          <strong>{{ f.bookTitle }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="member">
        <th mat-header-cell *matHeaderCellDef>Member</th>
        <td mat-cell *matCellDef="let f">{{ f.memberName }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let f">
          <span class="amount-text">${{ f.amount }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let f">
          <span class="status-badge"
            [ngClass]="f.isPaid ? 'badge-paid' : 'badge-unpaid'">
            {{ f.isPaid ? 'Paid' : 'Unpaid' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="paidAt">
        <th mat-header-cell *matHeaderCellDef>Paid At</th>
        <td mat-cell *matCellDef="let f">
          {{ f.paidAt ? (f.paidAt | date: 'yyyy-MM-dd') : '—' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let f">
          <button class="pay-btn" mat-raised-button
                  *ngIf="!f.isPaid"
                  (click)="payFine(f.id)">
            ✓ Mark as Paid
          </button>
          <span *ngIf="f.isPaid" class="paid-text">✓ Cleared</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="6">
          No fines found. Great job! 🎉
        </td>
      </tr>
    </table>
  </mat-card>
</div>
