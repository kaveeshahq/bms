<div class="container">
  <h1>Books Management System</h1>

  <button class="btn btn-add" (click)="openAddForm()">+ Add New Book</button>

  <!-- Book Form -->
  <div class="form-container" *ngIf="showForm">
    <h2>{{ isEditing ? 'Edit Book' : 'Add New Book' }}</h2>
    <form (ngSubmit)="saveBook()">
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" [(ngModel)]="book.title" name="title" required />
      </div>
      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" [(ngModel)]="book.author" name="author" required />
      </div>
      <div class="form-group">
        <label for="isbn">ISBN</label>
        <input type="text" id="isbn" [(ngModel)]="book.isbn" name="isbn" required />
      </div>
      <div class="form-group">
        <label for="publicationDate">Publication Date</label>
        <input type="date" id="publicationDate" [(ngModel)]="book.publicationDate" name="publicationDate" required />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-save">{{ isEditing ? 'Update' : 'Add' }}</button>
        <button type="button" class="btn btn-cancel" (click)="cancelForm()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Books Table -->
  <table *ngIf="books.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Publication Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of books">
        <td>{{ b.id }}</td>
        <td>{{ b.title }}</td>
        <td>{{ b.author }}</td>
        <td>{{ b.isbn }}</td>
        <td>{{ b.publicationDate | date: 'yyyy-MM-dd' }}</td>
        <td>
          <button class="btn btn-edit" (click)="editBook(b)">Edit</button>
          <button class="btn btn-delete" (click)="deleteBook(b.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="books.length === 0" class="no-books">No books found.</p>
</div>
